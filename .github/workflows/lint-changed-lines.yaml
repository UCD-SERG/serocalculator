# Lints only the lines a pull request adds or modifies (not whole changed
# files), so lint rules can be adopted or tightened incrementally: new and
# edited code must comply while untouched legacy code is left alone.
# Calls the reusable workflow from d-morrison/gha.
name: lint-changed-lines

on:
  pull_request:

jobs:
  lint:
    uses: d-morrison/gha/.github/workflows/lint-changed-lines.yml@v2
