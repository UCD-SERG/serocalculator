# Network-bound wrappers around external APIs (CRAN, GitHub).
# Can't be exercised in CI without network mocking, so exclude from
# coverage rather than dragging down patch/project metrics.
ignore:
  - "R/graph_downloads.R"

coverage:
  status:
    project: # add everything under here, more options at
     # https://docs.codecov.com/docs/commit-status
      default:
        # basic
        target: auto # default
        threshold: 1%
        base: auto
        informational: false # default
    patch:
      default:
        target: auto
        threshold: 1%
        informational: false
