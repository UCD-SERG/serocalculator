project:
  type: website
  output-dir: ../docs/
  render:
    - "*.qmd"              # Render all Quarto markdown files
    - "*.Rmd"              # Also render R markdown files
    - "*.md"               # Also render plain markdown files
    - "!README.md"         # Except README which is used in index
    - "!index.md"          # Except index which is replaced by index.qmd
    - "!vignettes/articles/_*.qmd"  # Exclude include-only files (prefixed with _)

# Enable freeze to cache expensive computations and speed up builds
# This is especially important for vignettes with long-running code
execute:
  freeze: auto  # re-execute only when source changes

bibliography: vignettes/references.bib
website:
  title: "$ALTDOC_PACKAGE_NAME"
  repo-url: $ALTDOC_PACKAGE_URL_GITHUB
  repo-actions: [edit, source, issue]
  navbar:
    search: true
    pinned: false
    right:
      - icon: github
        href: $ALTDOC_PACKAGE_URL_GITHUB
        aria-label: View $ALTDOC_PACKAGE_NAME on GitHub
    left:
      - text: Documentation
        file: man/serocalculator-package.qmd
      - text: Reference
        file: reference.qmd
      - text: Get started
        file: vignettes/articles/serocalculator.Rmd
      - text: Articles
        menu:
          - text: "---Methodology---"
          - text: "Methodology"
            file: vignettes/methodology.qmd
          - text: "Simulate cross-sectional data"
            file: vignettes/articles/simulate_xsectionalData.qmd
          - text: "---Examples---"
          - text: "Enteric fever example"
            file: vignettes/articles/enteric_fever_example.Rmd
          - text: "Scrub typhus example"
            file: vignettes/articles/scrubTyphus_example.Rmd
          - text: "---Other---"
          - text: "Version crosswalk (1.3 to 1.4)"
            file: vignettes/articles/version-crosswalk-1.3-to-1.4.qmd
      - text: Changelog
        file: NEWS.md
  sidebar:
    collapse-level: 1
    contents:
      - text: Home
        file: index.qmd
      - section: Articles
        contents:
          - section: Get started
            contents:
              - vignettes/articles/serocalculator.Rmd
          - section: Methodology
            contents:
              - vignettes/methodology.qmd
              - vignettes/articles/simulate_xsectionalData.qmd
          - section: Examples
            contents:
              - vignettes/articles/enteric_fever_example.Rmd
              - vignettes/articles/scrubTyphus_example.Rmd
          - section: Other
            contents:
              - vignettes/articles/version-crosswalk-1.3-to-1.4.qmd
      - section: Reference
        contents:
          - reference.qmd
          - section: Prepare data, kinetics models, and noise parameters for analysis
            contents:
              - man/as_pop_data.qmd
              - man/load_pop_data.qmd
              - man/as_sr_params.qmd
              - man/load_sr_params.qmd
              - man/as_noise_params.qmd
              - man/load_noise_params.qmd
              - man/check_pop_data.qmd
              - man/strata.qmd
          - section: Extract information from data, seroresponse models, and noise parameters
            contents:
              - man/get_biomarker_levels.qmd
              - man/get_biomarker_names_var.qmd
              - man/get_values_var.qmd
              - man/get_values.qmd
          - section: Visualize data
            contents:
              - man/autoplot.pop_data.qmd
              - man/autoplot.curve_params.qmd
              - man/graph.curve.params.qmd
              - man/graph_loglik.qmd
              - man/log_likelihood.qmd
          - section: Estimate seroconversion incidence rates
            contents:
              - man/est_seroincidence.qmd
              - man/est_seroincidence_by.qmd
          - section: Summarize seroconversion incidence rate estimates
            contents:
              - man/summary.seroincidence.qmd
              - man/summary.seroincidence.by.qmd
          - section: Visualize seroconversion incidence rate estimates
            contents:
              - man/autoplot.seroincidence.qmd
              - man/autoplot.seroincidence.by.qmd
              - man/autoplot.summary.seroincidence.by.qmd
          - section: Compare seroconversion incidence rates
            contents:
              - man/compare_seroincidence.qmd
          - section: Example data sets
            contents:
              - man/sees_pop_data_100.qmd
              - man/sees_pop_data_pk_100.qmd
              - man/typhoid_curves_nostrat_100.qmd
              - man/example_noise_params_sees.qmd
              - man/example_noise_params_pk.qmd
              - man/sees_typhoid_ests_strat.qmd
              - man/serocalculator_example.qmd
          - section: Simulate data sets
            contents:
              - man/sim_pop_data.qmd
              - man/sim_pop_data_multi.qmd
              - man/analyze_sims.qmd
              - man/autoplot.sim_results.qmd
      - text: News
        file: NEWS.md
      - text: Code of conduct
        file: CODE_OF_CONDUCT.md
      - text: Contributing
        file: CONTRIBUTING.md

format:
  html:
    code-link: true # enables downlit; see https://altdoc.etiennebacher.com/#/man/render_docs.md#auto-link-for-quarto-websites
    theme:
      light: default
      dark: darkly
    css: styles.css
    number-sections: false
    code-fold: show
    echo: true
    code-copy: true
    code-overflow: scroll
    title-block-style: none
    toc: true
    grid:
      sidebar-width: 340px
      margin-width: 340px
